<button
    type="button"
    dma-button
    #anchor="dmaDropdownAnchor"
    [toggleOnHover]="toggleOnHover()"
    [dmaDropdownAnchor]="dropdownContainer"
>
    <ng-content select="[dmaDropdownTrigger]" />
</button>

<ng-template #dropdownContainer>
    <dma-dropdown-container (hover)="anchor.scheduleClose(!$event)">
        <ng-content select="[dmaDropdownMenu]" />
    </dma-dropdown-container>
</ng-template>
