name: CI
description: Runs Continuous Integration checks
inputs:
    build-storybook:
        description: Whether to build Storybook
        default: 'true'
runs:
    using: composite
    steps:
        - name: Set up tools
          uses: dnd-mapp/.github/.github/actions/setup-tools@c3d8e5374660511ad91a0fe705cae3ba4643d674

        - name: Compile library
          shell: bash
          run: pnpm build

        - name: Check formatting
          shell: bash
          run: pnpm format:check

        - name: Run linting
          shell: bash
          run: pnpm lint

        - name: Compile storybook
          if: ${{ inputs.build-storybook == 'true' }}
          shell: bash
          run: pnpm storybook:build
